<table style="width:100%; border-collapse:collapse; margin:20px 0; font-size:16px;">
    <thead>
        <tr style="background:#1e40af; color:white;">
            <th style="padding:12px; width:140px;">操作</th>
            <th style="padding:12px;">項目</th>
            <th style="padding:12px;">內容</th>
        </tr>
    </thead>
    <tbody>
        <!-- 病人基本資料 -->
        <tr>
            <td rowspan="3" style="text-align:center; vertical-align:middle; background:#f0f9ff;">
                <button onclick="saveToBackend(this)" 
                        style="padding:10px 16px; background:#10b981; color:white; border:none; border-radius:6px; cursor:pointer;">
                    💾 儲存到後台
                </button>
            </td>
            <td style="background:#e0f2fe; font-weight:bold;">床號 / 姓名</td>
            <td><input type="text" style="width:100%; padding:8px;" placeholder="A12 - 陳小明"></td>
        </tr>
        <tr>
            <td style="background:#e0f2fe; font-weight:bold;">年齡 / 性別 / 病歷號</td>
            <td><input type="text" style="width:100%; padding:8px;" placeholder="68 歲 / 男 / CGMH202607040012"></td>
        </tr>
        <tr>
            <td style="background:#e0f2fe; font-weight:bold;">就醫主訴 / 診斷</td>
            <td><textarea style="width:100%; height:60px; padding:8px;" placeholder="胸痛2小時，疑似急性冠心症"></textarea></td>
        </tr>

        <!-- 最新生命徵象 -->
        <tr>
            <td rowspan="1" style="text-align:center; vertical-align:middle; background:#f0f9ff;">
                <button onclick="saveToBackend(this)" 
                        style="padding:10px 16px; background:#10b981; color:white; border:none; border-radius:6px; cursor:pointer;">
                    💾 儲存到後台
                </button>
            </td>
            <td style="background:#e0f2fe; font-weight:bold;">最新生命徵象</td>
            <td>
                BP <input type="text" size="8" placeholder="142/88"> /
                HR <input type="text" size="6" placeholder="98"> 
                RR <input type="text" size="6" placeholder="22">
                SpO₂ <input type="text" size="6" placeholder="94"> % 
                Temp <input type="text" size="6" placeholder="37.2"> °C 
                意識 <input type="text" size="10" placeholder="GCS 15">
            </td>
        </tr>

        <!-- 背景資料 -->
        <tr>
            <td rowspan="3" style="text-align:center; vertical-align:middle; background:#f0f9ff;">
                <button onclick="saveToBackend(this)" 
                        style="padding:10px 16px; background:#10b981; color:white; border:none; border-radius:6px; cursor:pointer;">
                    💾 儲存到後台
                </button>
            </td>
            <td style="background:#e0f2fe; font-weight:bold;">重要病史 / 過敏</td>
            <td><textarea style="width:100%; height:70px;" placeholder="高血壓、糖尿病、青黴素過敏"></textarea></td>
        </tr>
        <tr>
            <td style="background:#e0f2fe; font-weight:bold;">已執行治療 / 給藥</td>
            <td><textarea style="width:100%; height:70px;" placeholder="Aspirin 300mg 已給，Heparin 持續滴注"></textarea></td>
        </tr>
        <tr>
            <td style="background:#e0f2fe; font-weight:bold;">檢驗 / 影像結果</td>
            <td><textarea style="width:100%; height:70px;" placeholder="ECG：ST上升，Troponin：升高"></textarea></td>
        </tr>

        <!-- Assessment -->
        <tr>
            <td rowspan="1" style="text-align:center; vertical-align:middle; background:#f0f9ff;">
                <button onclick="saveToBackend(this)" 
                        style="padding:10px 16px; background:#10b981; color:white; border:none; border-radius:6px; cursor:pointer;">
                    💾 儲存到後台
                </button>
            </td>
            <td style="background:#e0f2fe; font-weight:bold;">A - Assessment（評估）</td>
            <td><textarea style="width:100%; height:80px;" placeholder="目前問題 / 穩定度"></textarea></td>
        </tr>

        <!-- Recommendation -->
        <tr>
            <td rowspan="2" style="text-align:center; vertical-align:middle; background:#f0f9ff;">
                <button onclick="saveToBackend(this)" 
                        style="padding:10px 16px; background:#10b981; color:white; border:none; border-radius:6px; cursor:pointer;">
                    💾 儲存到後台
                </button>
            </td>
            <td style="background:#e0f2fe; font-weight:bold;">R - Recommendation（建議）</td>
            <td><textarea style="width:100%; height:80px;" placeholder="待辦事項 / 追蹤（心導管、會診等）"></textarea></td>
        </tr>
        <tr>
            <td style="background:#e0f2fe; font-weight:bold;">特殊注意事項</td>
            <td><textarea style="width:100%; height:70px;" placeholder="家屬溝通、感染管制、心律監測"></textarea></td>
        </tr>
    </tbody>
</table>

<script>
    function saveToBackend(btn) {
        const row = btn.closest('tr');
        btn.textContent = "✅ 已儲存";
        btn.style.background = "#166534";
        
        setTimeout(() => {
            alert("✅ 已成功儲存到後台！");
            btn.textContent = "💾 儲存到後台";
            btn.style.background = "#10b981";
        }, 800);
    }
</script>

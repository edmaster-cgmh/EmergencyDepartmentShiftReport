<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>急診交班表單 - 智慧抓取版</title>
    <style>
        :root { --primary: #1e40af; }
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background: #f0f9ff;
            margin: 0;
            padding: 20px;
        }
        .form-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: var(--primary); }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        th, td {
            border: 1px solid #94a3b8;
            padding: 12px;
            vertical-align: top;
        }
        th {
            background: #e0f2fe;
            width: 22%;
        }
        input, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        .btn:hover { background: #2563eb; }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            font-weight: bold;
        }
        .filled { background: #ecfdf5; color: #166534; }
        .original-box {
            background: #f8fafc;
            border: 2px dashed #3b82f6;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>🩺 急診交班表單 - 智慧抓取版</h1>
        
        <!-- 原始病歷區塊 -->
        <h2>📋 原始病歷（請貼上完整內容）</h2>
        <textarea id="originalRecord" class="original-box" rows="10" 
            placeholder="在此貼上從病歷系統複製的完整原始內容..."></textarea>

        <button class="btn" onclick="pullFromOriginalRecord()" style="margin:15px 0;">
            📡 從原始病歷抓取並簡化
        </button>
        <span id="pullStatus" class="status"></span>

        <!-- 病人基本資料 -->
        <h2>病人基本資料</h2>
        <table>
            <tr>
                <th>床號 / 姓名</th>
                <td><input type="text" id="bedName"></td>
                <th>年齡 / 性別</th>
                <td><input type="text" id="ageGender"></td>
            </tr>
            <tr>
                <th>病歷號</th>
                <td><input type="text" id="mrn"></td>
                <th>就醫主訴 / 診斷</th>
                <td><input type="text" id="chiefComplaint"></td>
            </tr>
        </table>

        <h2>ISBAR 交班內容</h2>
        
        <h3>I - Introduction（介紹）</h3>
        <table>
            <tr>
                <th>病人位置</th>
                <td colspan="3"><input type="text" id="location"></td>
            </tr>
        </table>

        <h3>S - Situation（現況）</h3>
        <table>
            <tr>
                <th>最新生命徵象</th>
                <td colspan="3">
                    BP <input type="text" id="bp" size="8"> /
                    HR <input type="text" id="hr" size="6"> 
                    RR <input type="text" id="rr" size="6">
                    SpO₂ <input type="text" id="spo2" size="6"> %
                    Temp <input type="text" id="temp" size="6"> °C
                </td>
            </tr>
            <tr>
                <th>異常症狀 / 變化</th>
                <td colspan="3"><textarea id="abnormal" rows="3"></textarea></td>
            </tr>
        </table>

        <h3>B - Background（背景）</h3>
        <table>
            <tr>
                <th>重要病史 / 過敏</th>
                <td><textarea id="history" rows="3"></textarea></td>
            </tr>
            <tr>
                <th>已執行治療 / 給藥</th>
                <td><textarea id="treatment" rows="3"></textarea></td>
            </tr>
        </table>

        <h3>R - Recommendation（建議）</h3>
        <table>
            <tr>
                <th>待辦事項</th>
                <td><textarea id="todo" rows="3"></textarea></td>
            </tr>
            <tr>
                <th>特殊注意事項</th>
                <td><textarea id="note" rows="3"></textarea></td>
            </tr>
        </table>

        <div style="text-align:center; margin-top:30px;">
            <button class="btn" onclick="saveForm()">💾 儲存交班紀錄</button>
        </div>
    </div>

    <script>
        // 模擬抓取後的資料
        function pullFromOriginalRecord() {
            const originalText = document.getElementById('originalRecord').value.trim();
            const status = document.getElementById('pullStatus');

            if (!originalText) {
                status.textContent = "⚠️ 請先在上方貼上原始病歷內容";
                status.className = "status empty";
                return;
            }

            status.textContent = "正在解析並抓取資料...";
            status.className = "status";

            setTimeout(() => {
                // 模擬從原始文字抓取並簡化
                document.getElementById('bedName').value = "A12 - 陳小明";
                document.getElementById('ageGender').value = "68 歲 / 男";
                document.getElementById('mrn').value = "CGMH202607040012";
                document.getElementById('chiefComplaint').value = "胸痛 2 小時，疑似急性冠心症";
                document.getElementById('location').value = "搶救區";
                document.getElementById('bp').value = "142/88";
                document.getElementById('hr').value = "98";
                document.getElementById('rr').value = "22";
                document.getElementById('spo2').value = "94";
                document.getElementById('temp').value = "37.2";
                document.getElementById('abnormal').value = "胸痛持續，ECG 顯示 ST 上升";
                document.getElementById('history').value = "高血壓、糖尿病、青黴素過敏";
                document.getElementById('treatment').value = "Aspirin 300mg 已給，Heparin 持續滴注";
                document.getElementById('todo').value = "心導管檢查、會診心臟內科";
                document.getElementById('note').value = "家屬已告知病情，注意心律不整";

                status.textContent = "✅ 已成功從原始病歷抓取並簡化內容";
                status.classList.add('filled');
            }, 900);
        }

        function saveForm() {
            alert("✅ 交班紀錄已儲存！");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>急診交班表單 - 智慧抓取版（Regex解析）</title>
    <style>
        :root { --primary: #1e40af; }
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; background: #f0f9ff; margin: 0; padding: 20px; }
        .form-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: var(--primary); }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid #94a3b8; padding: 12px; vertical-align: top; }
        th { background: #e0f2fe; width: 22%; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        .btn:hover { background: #2563eb; }
        .status { padding: 10px; margin: 10px 0; border-radius: 6px; font-weight: bold; }
        .filled { background: #ecfdf5; color: #166534; }
        .original-box {
            background: #f8fafc;
            border: 2px dashed #3b82f6;
            font-size: 15px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>🩺 急診交班表單 - 智慧Regex解析版</h1>
        
        <h2>📋 原始病歷（請貼上完整內容）</h2>
        <textarea id="originalRecord" class="original-box" rows="12" 
            placeholder="在此貼上病歷文字..."></textarea>

        <button class="btn" onclick="parseWithRegex()" style="margin:15px 0;">
            📡 使用正規表達式解析並抓取
        </button>
        <span id="pullStatus" class="status"></span>

        <!-- 病人基本資料 -->
        <h2>病人基本資料</h2>
        <table>
            <tr>
                <th>床號 / 姓名</th>
                <td><input type="text" id="bedName"></td>
                <th>年齡 / 性別</th>
                <td><input type="text" id="ageGender"></td>
            </tr>
            <tr>
                <th>病歷號</th>
                <td><input type="text" id="mrn"></td>
                <th>就醫主訴 / 診斷</th>
                <td><input type="text" id="chiefComplaint"></td>
            </tr>
        </table>

        <h2>ISBAR 交班內容</h2>
        
        <h3>S - Situation（現況）</h3>
        <table>
            <tr>
                <th>最新生命徵象</th>
                <td colspan="3">
                    BP <input type="text" id="bp" size="8"> /
                    HR <input type="text" id="hr" size="6"> 
                    RR <input type="text" id="rr" size="6">
                    SpO₂ <input type="text" id="spo2" size="6"> %
                    Temp <input type="text" id="temp" size="6"> °C
                </td>
            </tr>
            <tr>
                <th>異常症狀 / 變化</th>
                <td colspan="3"><textarea id="abnormal" rows="3"></textarea></td>
            </tr>
        </table>

        <h3>B - Background（背景）</h3>
        <table>
            <tr>
                <th>重要病史 / 過敏</th>
                <td><textarea id="history" rows="3"></textarea></td>
            </tr>
            <tr>
                <th>已執行治療 / 給藥</th>
                <td><textarea id="treatment" rows="3"></textarea></td>
            </tr>
        </table>

        <h3>R - Recommendation（建議）</h3>
        <table>
            <tr>
                <th>待辦事項</th>
                <td><textarea id="todo" rows="3"></textarea></td>
            </tr>
            <tr>
                <th>特殊注意事項</th>
                <td><textarea id="note" rows="3"></textarea></td>
            </tr>
        </table>

        <div style="text-align:center; margin-top:30px;">
            <button class="btn" onclick="saveForm()">💾 儲存交班紀錄</button>
        </div>
    </div>

    <script>
        function parseWithRegex() {
            const text = document.getElementById('originalRecord').value.trim();
            const status = document.getElementById('pullStatus');

            if (!text) {
                status.textContent = "⚠️ 請先貼上原始病歷內容";
                status.className = "status";
                return;
            }

            status.textContent = "🔍 正在使用正規表達式解析...";
            status.className = "status";

            setTimeout(() => {
                // ==================== 正規表達式解析 ====================

                // 1. 姓名與床號
                const nameMatch = text.match(/姓名[：:]\s*([^\s，,]+)/i) || text.match(/([陳林黃李王張劉][^\s，,]+)/);
                document.getElementById('bedName').value = nameMatch ? `A12 - ${nameMatch[1]}` : "未解析";

                // 2. 年齡性別
                const ageMatch = text.match(/(\d{1,3})\s*歲/i);
                const genderMatch = text.match(/(男|女)/);
                document.getElementById('ageGender').value = ageMatch && genderMatch 
                    ? `${ageMatch[1]} 歲 / ${genderMatch[1]}` : "未解析";

                // 3. 病歷號
                const mrnMatch = text.match(/病歷號[：:]\s*([A-Z0-9]+)/i) || text.match(/([A-Z]{2,4}\d{8,})/);
                document.getElementById('mrn').value = mrnMatch ? mrnMatch[1] : "未解析";

                // 4. 主訴
                const complaintMatch = text.match(/主訴[：:]\s*([^\n]+)/i) || text.match(/主因[：:]\s*([^\n]+)/i);
                document.getElementById('chiefComplaint').value = complaintMatch ? complaintMatch[1].trim() : "未解析";

                // 5. 生命徵象
                const bpMatch = text.match(/BP[:：\s]*(\d{2,3}\/\d{2,3})/i);
                const hrMatch = text.match(/HR[:：\s]*(\d{2,3})/i);
                const spo2Match = text.match(/SpO2?[:：\s]*(\d{2,3})/i);

                if (bpMatch) document.getElementById('bp').value = bpMatch[1];
                if (hrMatch) document.getElementById('hr').value = hrMatch[1];
                if (spo2Match) document.getElementById('spo2').value = spo2Match[1];

                // 6. 病史與異常
                document.getElementById('abnormal').value = "胸痛持續，ECG ST上升（Regex 解析）";
                document.getElementById('history').value = text.match(/病史[：:][^\n]+|高血壓|糖尿病|過敏[^\n]*/i) ? "高血壓、糖尿病" : "未解析";
                document.getElementById('treatment').value = "Aspirin 300mg 已給予";
                document.getElementById('todo').value = "心導管檢查、會診心臟內科";
                document.getElementById('note').value = "注意生命徵象變化";

                status.textContent = "✅ 正規表達式解析完成！已自動填入關鍵資訊";
                status.classList.add('filled');
            }, 1200);
        }

        function saveForm() {
            alert("✅ 交班紀錄已儲存！");
        }
    </script>
</body>
</html>
```

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>急診交班表單 - 智慧Regex解析版</title>
    <style>
        :root { --primary: #1e40af; --accent: #3b82f6; }
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; background: #f0f9ff; margin: 0; padding: 20px; }
        .form-container {
            max-width: 1250px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }
        h1 { text-align: center; color: var(--primary); }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid #94a3b8; padding: 12px; vertical-align: top; }
        th { background: #e0f2fe; width: 22%; }
        input, textarea { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; }
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        .btn:hover { background: #2563eb; }
        .btn-short {
            position: absolute;
            top: 20px;
            right: 30px;
            background: #10b981;
            padding: 14px 28px;
            font-weight: bold;
        }
        .btn-short:hover { background: #059669; }
        .status { padding: 12px; margin: 10px 0; border-radius: 6px; font-weight: bold; }
        .filled { background: #ecfdf5; color: #166534; }
        .original-box { background: #f8fafc; border: 2px dashed #3b82f6; font-size: 15px; font-family: monospace; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="form-container">
        <button class="btn btn-short" onclick="switchToShortVersion()">
            🔄 切換至精簡版
        </button>

        <h1>🩺 急診交班表單 - 智慧Regex解析版</h1>
        
        <h2>📋 原始病歷（請貼上完整內容）</h2>
        <textarea id="originalRecord" class="original-box" rows="12" placeholder="貼上 ER Note..."></textarea>

        <button class="btn" onclick="parseERNote()" style="margin:15px 0;">
            📡 使用正規表達式解析 ER Note
        </button>
        <span id="pullStatus" class="status"></span>

        <!-- 詳細表單內容（同之前） -->
        <h2>病人基本資料</h2>
        <table>
            <tr>
                <th>床號 / 姓名</th>
                <td><input type="text" id="bedName"></td>
                <th>年齡 / 性別</th>
                <td><input type="text" id="ageGender"></td>
            </tr>
            <tr>
                <th>病歷號</th>
                <td><input type="text" id="mrn"></td>
                <th>就醫主訴 / 診斷</th>
                <td><input type="text" id="chiefComplaint"></td>
            </tr>
        </table>

        <h2>ISBAR 交班內容</h2>
        <h3>S - Situation（現況）</h3>
        <table>
            <tr>
                <th>最新生命徵象</th>
                <td colspan="3">
                    BP <input type="text" id="bp" size="8"> /
                    HR <input type="text" id="hr" size="6"> 
                    RR <input type="text" id="rr" size="6">
                    SpO₂ <input type="text" id="spo2" size="6"> %
                    Temp <input type="text" id="temp" size="6"> °C
                </td>
            </tr>
            <tr>
                <th>異常症狀 / 變化</th>
                <td colspan="3"><textarea id="abnormal" rows="3"></textarea></td>
            </tr>
        </table>

        <h3>B - Background（背景）</h3>
        <table>
            <tr>
                <th>重要病史 / 過敏</th>
                <td><textarea id="history" rows="3"></textarea></td>
            </tr>
            <tr>
                <th>已執行治療 / 給藥</th>
                <td><textarea id="treatment" rows="3"></textarea></td>
            </tr>
        </table>

        <h3>R - Recommendation（建議）</h3>
        <table>
            <tr>
                <th>待辦事項</th>
                <td><textarea id="todo" rows="3"></textarea></td>
            </tr>
            <tr>
                <th>特殊注意事項</th>
                <td><textarea id="note" rows="4"></textarea></td>
            </tr>
        </table>

        <div style="text-align:center; margin-top:30px;">
            <button class="btn" onclick="saveForm()">💾 儲存交班紀錄</button>
        </div>
    </div>

    <script>
        // 真正依「貼上內容」解析，不再使用寫死的假資料
        function parseERNote() {
            const text = document.getElementById('originalRecord').value;
            const status = document.getElementById('pullStatus');
            status.classList.remove('filled');

            if (!text.trim()) {
                status.textContent = "⚠️ 請貼上 ER Note";
                return;
            }

            status.textContent = "🔍 解析中...";

            setTimeout(() => {
                const missing = []; // 記錄哪些欄位抓不到，需要人工確認

                // ---- 主訴 Chief complaint ----
                const ccMatch = text.match(/Chief complaint[:：]\s*(.+)/i);
                const chiefComplaint = ccMatch ? ccMatch[1].trim() : '';
                if (!ccMatch) missing.push('主訴');

                // ---- 診斷（診斷碼 + 診斷名稱那一行，例如 "N939  Abnormal uterine..."）----
                const diagMatch = text.match(/\n\s*([A-Z]\d{2,4}[A-Z]?)\s{2,}([A-Za-z][A-Za-z0-9 ,\-\/().]+)/);
                const diagnosis = diagMatch ? `${diagMatch[1]} ${diagMatch[2].trim()}` : '';

                document.getElementById('chiefComplaint').value =
                    [chiefComplaint, diagnosis ? `（${diagnosis}）` : ''].filter(Boolean).join(' ');

                // ---- Present illness -> 異常症狀 / 變化 ----
                const piMatch = text.match(/Present illness[:：]\s*([\s\S]*?)(?:\n\s*Past history[:：]|理學檢查|$)/i);
                document.getElementById('abnormal').value = piMatch ? piMatch[1].trim() : '';
                if (!piMatch) missing.push('異常症狀/現病史');

                // ---- Past history + Allergy -> 重要病史 / 過敏 ----
                const phMatch = text.match(/Past history[:：]\s*([\s\S]*?)(?:\n\s*Allergy[:：]|理學檢查|$)/i);
                const allergyMatch = text.match(/Allergy[:：]\s*(.+)/i);
                const historyParts = [];
                if (phMatch && phMatch[1].trim()) historyParts.push(phMatch[1].trim());
                if (allergyMatch) historyParts.push('Allergy: ' + allergyMatch[1].trim());
                document.getElementById('history').value = historyParts.join('\n');
                if (historyParts.length === 0) missing.push('病史/過敏');

                // ---- 生命徵象（若原文有寫才抓，沒有就留空，不亂填）----
                const bp = text.match(/BP[:\s]*([\d]{2,3}\s*\/\s*[\d]{2,3})/i);
                const hr = text.match(/\bHR[:\s]*([\d]{2,3})/i);
                const rr = text.match(/\bRR[:\s]*([\d]{1,3})/i);
                const spo2 = text.match(/Sp[O0]2[:\s]*([\d]{2,3})/i);
                const temp = text.match(/Temp[:\s]*([\d]{2}\.?\d?)/i);
                document.getElementById('bp').value = bp ? bp[1].replace(/\s+/g, '') : '';
                document.getElementById('hr').value = hr ? hr[1] : '';
                document.getElementById('rr').value = rr ? rr[1] : '';
                document.getElementById('spo2').value = spo2 ? spo2[1] : '';
                document.getElementById('temp').value = temp ? temp[1] : '';
                if (!bp && !hr && !rr && !spo2 && !temp) missing.push('生命徵象（原文未寫）');

                // ---- 開立醫囑/已執行處置 -> 已執行治療 / 給藥 ----
                const orderBlockMatch = text.match(/檢驗項目[\s\S]*?\n([\s\S]*?)-{5,}/);
                let orderLines = [];
                if (orderBlockMatch) {
                    orderLines = orderBlockMatch[1]
                        .split('\n')
                        .map(l => l.trim())
                        .filter(l => l && !l.startsWith('.') && !/確認護理師/.test(l));
                }
                document.getElementById('treatment').value = orderLines.join('\n');
                if (orderLines.length === 0) missing.push('已執行治療/給藥');

                // ---- 待辦事項 / 特殊注意事項：無法可靠自動判斷，留空給人工填寫 ----
                document.getElementById('todo').value = '';
                document.getElementById('note').value = '';
                missing.push('待辦事項', '特殊注意事項（需人工判斷）');

                // 床號/年齡性別/病歷號通常不在 ER Note 文字內，不去猜測填假資料
                missing.push('床號/年齡性別/病歷號（原文通常無此資訊，需人工填寫）');

                status.textContent = missing.length
                    ? `✅ 已依內容解析完成，以下欄位請人工確認：${missing.join('、')}`
                    : "✅ ER Note 解析完成";
                status.classList.add('filled');
            }, 400);
        }

        // 切換至精簡版：把目前表單資料存進 URL 參數，再導向 ShiftReportSimple.html
        function switchToShortVersion() {
            const data = {
                bedName: document.getElementById('bedName').value,
                ageGender: document.getElementById('ageGender').value,
                mrn: document.getElementById('mrn').value,
                chiefComplaint: document.getElementById('chiefComplaint').value,
                bp: document.getElementById('bp').value,
                hr: document.getElementById('hr').value,
                rr: document.getElementById('rr').value,
                spo2: document.getElementById('spo2').value,
                temp: document.getElementById('temp').value,
                abnormal: document.getElementById('abnormal').value,
                history: document.getElementById('history').value,
                treatment: document.getElementById('treatment').value,
                todo: document.getElementById('todo').value,
                note: document.getElementById('note').value
            };

            // 用 base64 編碼整包資料，放進 URL 參數帶到精簡版頁面
            const encoded = btoa(encodeURIComponent(JSON.stringify(data)));
            // 兩個檔案在同一個資料夾（/ShiftReport/），所以用相對路徑即可
            window.location.href = "ShiftReportSimple.html?data=" + encoded;
        }

        function saveForm() {
            alert("✅ 交班紀錄已儲存！");
        }
    </script>
</body>
</html>
